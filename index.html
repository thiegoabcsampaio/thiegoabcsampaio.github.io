<style>
  :root{
    --bg:            #F1EEE7;
    --surface:       #FAF8F3;
    --ink:           #211B18;
    --ink-soft:      #55504B;
    --line:          #4D160F;
    --line-soft:     rgba(77,22,15,0.22);
    --accent-wash:   rgba(77,22,15,0.06);
    --accent-wash-2: rgba(77,22,15,0.10);
    --max:           440px;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size:16px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }

  .wrap{
    max-width:var(--max);
    margin:0 auto;
    padding:48px 24px 40px;
  }

  /* ---------- Perfil ---------- */
  .profile{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .avatar{
    width:104px;
    height:104px;
    border-radius:50%;
    object-fit:cover;
    border:1px solid var(--line-soft);
    display:block;
  }

  .profile .role{
    margin-top:20px;
    font-family:'Source Serif 4', Georgia, serif;
    font-size:18px;
    color:var(--ink);
    font-weight:600;
  }

  .profile .chapter{
    margin-top:6px;
    font-family:'Inter',sans-serif;
    font-size:11.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--line);
    font-weight:500;
  }

  /* ---------- Links ---------- */
  .links{
    margin-top:36px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .link-btn{
    display:flex;
    align-items:center;
    gap:14px;
    padding:15px 20px;
    border:1px solid var(--line-soft);
    background:var(--surface);
    border-radius:999px;
    text-decoration:none;
    color:var(--ink);
    transition:background .15s ease, border-color .15s ease;
  }
  .link-btn:active,
  .link-btn:hover{
    background:var(--accent-wash-2);
    border-color:var(--line);
  }

  .link-btn .ico{
    flex:0 0 auto;
    width:22px;
    height:22px;
    color:var(--line);
  }
  .link-btn .ico svg{
    width:100%;
    height:100%;
    display:block;
  }

  .link-btn .txt{
    flex:1;
    font-size:15px;
    font-weight:500;
  }

  .link-btn.primary{
    background:var(--line);
    border-color:var(--line);
  }
  .link-btn.primary .txt{
    color:var(--surface);
    font-weight:600;
  }
  .link-btn.primary .ico{
    color:var(--surface);
  }
  .link-btn.primary:active,
  .link-btn.primary:hover{
    background:#3a100b;
  }

  /* ---------- Footer ---------- */
  footer{
    margin-top:44px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
  }

  footer img{
    width:150px;
    height:auto;
    opacity:0.85;
  }

  footer .cap{
    font-size:11px;
    color:var(--ink-soft);
    letter-spacing:0.04em;
  }
</style>
</head>
